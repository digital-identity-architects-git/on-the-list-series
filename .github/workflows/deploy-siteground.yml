name: Deploy to SiteGround

# Pushes the static site straight onto the live SiteGround hosting over SFTP
# whenever main changes. Configure the secrets/vars below once (see README),
# then deployment is fully automatic.
#
# SiteGround's SSH/SFTP only accepts key-based login, so this uses an SSH
# private key (SITEGROUND_SSH_KEY) rather than a password.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: siteground-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stage only the site files into _site/ so repo/dev files (.git, .github,
      # README) never get uploaded into the public web root.
      - name: Stage site files
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'README.md'

      - name: Upload site over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          ssh_private_key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: ${{ vars.SITEGROUND_PORT || '18765' }}
          local_path: './_site/*'
          remote_path: ${{ vars.SITEGROUND_REMOTE_PATH || 'public_html' }}
          sftp_only: true
