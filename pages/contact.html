  <article class="section">
    <div class="wrap prose">
      <p class="eyebrow">Get in Touch</p>
      <h1>Contact</h1>
      <p>For pre-order updates, press, events, or rights enquiries, email <a href="mailto:hello@on-the-list-series.com">hello@on-the-list-series.com</a>.</p>

      <form class="mt" action="https://formspree.io/f/your-form-id" method="POST">
        <p><label>Name<br><input type="text" name="name" required style="width:100%;padding:12px;background:#16141a;border:1px solid #2a2730;color:#f4efe7;border-radius:4px"></label></p>
        <p><label>Email<br><input type="email" name="email" required style="width:100%;padding:12px;background:#16141a;border:1px solid #2a2730;color:#f4efe7;border-radius:4px"></label></p>
        <p><label>Message<br><textarea name="message" rows="5" style="width:100%;padding:12px;background:#16141a;border:1px solid #2a2730;color:#f4efe7;border-radius:4px"></textarea></label></p>
        <button class="btn" type="submit">Send</button>
      </form>
      <p class="muted mt" style="font-size:.85rem">Replace the form action with your own endpoint (Formspree, Netlify Forms, etc.).</p>
    </div>
  </article>
